name: Cross-Compile (Linux to Windows)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  cross-build:
    name: Build Windows VST3 on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar xz-utils cmake

      - name: Download LLVM-MinGW
        run: |
          # Use the version matching the local project
          VERSION="20260505"
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/$VERSION/llvm-mingw-$VERSION-ucrt-ubuntu-22.04-x86_64.tar.xz"
          wget $URL -O llvm-mingw.tar.xz
          mkdir -p llvm-mingw
          tar -xf llvm-mingw.tar.xz -C llvm-mingw --strip-components=1

      - name: Fix Toolchain Path
        run: |
          # Update the toolchain path in the cmake file to point to our CI location
          CI_TOOLCHAIN_PATH="$(pwd)/llvm-mingw"
          sed -i "s|set(TOOLCHAIN_PATH \".*\")|set(TOOLCHAIN_PATH \"$CI_TOOLCHAIN_PATH\")|" mingw-toolchain.cmake

      - name: Configure CMake
        run: |
          cmake -B build-win \
            -DCMAKE_TOOLCHAIN_FILE=mingw-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_EXTRAS=ON

      - name: Build Plugin
        run: cmake --build build-win --config Release --parallel $(nproc)

      - name: Upload Windows Cross-Build
        uses: actions/upload-artifact@v3
        with:
          name: LayerEngine-Windows-Cross
          path: build-win/LayerEngine_artefacts/Release/VST3/LayerEngine.vst3
