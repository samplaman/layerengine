name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev mesa-common-dev freeglut3-dev

      - name: Setup CMake
        uses: jwlawrence/actions-setup-cmake@v1.1
        with:
          cmake-version: '3.22.x'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Plugin
        run: cmake --build build --config Release --parallel 4

      - name: Upload Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: LayerEngine-Windows
          path: |
            build/LayerEngine_artefacts/Release/VST3/LayerEngine.vst3
            build/LayerEngine_artefacts/Release/Standalone/LayerEngine.exe

      - name: Upload Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v3
        with:
          name: LayerEngine-macOS
          path: build/LayerEngine_artefacts/Release/VST3/LayerEngine.vst3

      - name: Upload Artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v3
        with:
          name: LayerEngine-Linux
          path: |
            build/LayerEngine_artefacts/VST3/LayerEngine.vst3
            build/LayerEngine_artefacts/Standalone/LayerEngine
