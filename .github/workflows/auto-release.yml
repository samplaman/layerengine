name: Continuous Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Linux
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev mesa-common-dev freeglut3-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DJUCE_BUILD_EXTRAS=OFF

      - name: Build Plugin
        run: cmake --build build --config Release --parallel $(nproc)

      - name: Prepare Artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          # Find VST3
          VST_PATH=$(find build/LayerEngine_artefacts -name "LayerEngine.vst3" -type d | head -n 1)
          # Find Standalone (Linux binary)
          STANDALONE_PATH=$(find build/LayerEngine_artefacts -name "LayerEngine" -type f -executable | head -n 1)
          # Find AU (macOS only)
          AU_PATH=$(find build/LayerEngine_artefacts -name "LayerEngine.component" -type d | head -n 1)
          # Find App Bundle (macOS only)
          APP_PATH=$(find build/LayerEngine_artefacts -name "LayerEngine.app" -type d | head -n 1)
          
          if [ -d "$VST_PATH" ]; then cp -r "$VST_PATH" artifacts/; fi
          if [ -f "$STANDALONE_PATH" ]; then cp "$STANDALONE_PATH" artifacts/; fi
          if [ -d "$AU_PATH" ]; then cp -r "$AU_PATH" artifacts/; fi
          if [ -d "$APP_PATH" ]; then cp -r "$APP_PATH" artifacts/; fi
          
          # Platform-specific packaging
          if [ "${{ matrix.platform }}" = "macOS" ]; then
            chmod +x build_mac_installer.sh
            ./build_mac_installer.sh
            mkdir -p final_zip
            cp LayerEngine-Installer.pkg final_zip/
            cd final_zip && zip -r ../LayerEngine-macOS.zip .
          else
            # Linux
            chmod +x build_linux_installer.sh
            ./build_linux_installer.sh
            
            # Create a universal package too
            mkdir -p universal
            cp artifacts/LayerEngine universal/
            cp -r artifacts/LayerEngine.vst3 universal/
            cp assets/logo.png universal/
            cp install.sh universal/
            
            # deb zip
            mkdir -p deb_zip
            cp LayerEngine-Installer.deb deb_zip/
            cd deb_zip && zip -r ../LayerEngine-Linux-Debian.zip .
            cd ..
            
            # universal zip
            cd universal && zip -r ../LayerEngine-Linux-Universal.zip .
            cd ..
          fi

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $vst = Get-ChildItem -Path build/LayerEngine_artefacts -Filter "LayerEngine.vst3" -Recurse | Select-Object -First 1
          $exe = Get-ChildItem -Path build/LayerEngine_artefacts -Filter "LayerEngine.exe" -Recurse | Select-Object -First 1
          
          if ($vst) { Copy-Item -Path $vst.FullName -Destination artifacts/ -Recurse }
          if ($exe) { Copy-Item -Path $exe.FullName -Destination artifacts/ }
          
          # Build NSIS Installer
          if (Test-Path "C:\Program Files (x86)\NSIS\makensis.exe") {
              & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          } else {
              makensis installer.nsi
          }
          
          # Package Installer into Zip
          New-Item -ItemType Directory -Force -Path final_zip
          Copy-Item -Path LayerEngine-Installer.exe -Destination final_zip/
          Compress-Archive -Path final_zip/* -DestinationPath LayerEngine-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LayerEngine-${{ matrix.platform }}
          path: LayerEngine-*.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Set Release Tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          else
            echo "TAG_NAME=latest" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          fi

      - name: Update Tag Reference
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${process.env.TAG_NAME}`,
                sha: context.sha,
                force: true
              })
            } catch (e) {
              console.log("Tag might not exist yet, it will be created by the release step.");
            }

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ github.sha }}
          name: LayerEngine ${{ env.TAG_NAME }}
          files: |
            LayerEngine-Linux/LayerEngine-Linux-Universal.zip
            LayerEngine-Linux/LayerEngine-Linux-Debian.zip
            LayerEngine-macOS/LayerEngine-macOS.zip
            LayerEngine-Windows/LayerEngine-Windows.zip
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
